name: Create Template Branch

on:
  push:
    tags:
      - 'template-v*'

jobs:
  create-template-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create template branch
        run: |
          git checkout -b template
          
          rm -rf content
          rm static/lore
          rm -f README.md
          
          git add .
          git commit -m "Create template from ${{ github.ref_name }}"
          git push origin template --force